apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: OrgMembers
metadata:
  namespace: default
  name: my-org-managers
spec:
  forProvider:
    roleType: Managers
    members:
      - username: $USER_WHERE_ROLES_GET_ASSIGNED
    orgRef:
      name: my-org
    enforcementPolicy: Lax
