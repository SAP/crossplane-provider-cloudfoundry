apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: ServiceKey
metadata:
  name: my-service-key
spec:
  forProvider:
    name: my-service-key
    serviceInstanceRef:
      name: my-service-instance
      policy:
        resolve: Always
    connectionDetailsAsJSON: false
  writeConnectionSecretToRef:
    name: my-service-key-secret
    namespace: default