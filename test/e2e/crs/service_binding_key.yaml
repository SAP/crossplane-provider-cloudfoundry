apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: ServiceCredentialBinding
metadata:
  name: e2e-service-binding-key
spec:
  forProvider:
    name: e2e-service-binding-key
    type: key
    serviceInstanceRef:
      name: e2e-service-instance
      policy:
        resolve: Always
  connectionDetailsAsJSON: false
  writeConnectionSecretToRef:
    name: e2e-service-credential
    namespace: default
