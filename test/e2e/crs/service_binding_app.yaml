apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: ServiceCredentialBinding
metadata:
  name: e2e-service-binding-app
spec:
  forProvider:
    name: e2e-service-binding-app
    type: key
    serviceInstanceRef:
      name: e2e-service-instance
      policy:
        resolve: Always
    appRef:
      name: e2e-app
      policy:
        resolve: Always
