apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: App
metadata:
  namespace: default
  name: e2e-app
spec:
  forProvider:
    name: e2e-app
    spaceRef:
      name: e2e-space
      policy:
        resolve: Always
    lifecycle: docker
    docker:
      image: loud/hello_co:latest
    processes:
      - type: web
        health-check-type: http
        health-check-http-endpoint: "/"
    routes:
      - routeRef: 
          name: e2e-route
          policy:
            resolve: Always
