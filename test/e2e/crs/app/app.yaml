apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: App
metadata:
  namespace: app-test
  name: e2e-app
spec:
  forProvider:
    name: e2e-app-$BUILD_ID
    spaceRef:
      name: app-space
      policy:
        resolve: Always
    lifecycle: docker
    docker:
      image: ghcr.io/nginxinc/nginx-unprivileged:latest
    processes:
      - type: web
        health-check-type: http
        health-check-http-endpoint: "/"
    routes:
      - routeRef: 
          name: app-route-domainref
          policy:
            resolve: Always
    labels:
      environment: test
      team: platform
    annotations:
      description: E2E test app

