apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: ServiceCredentialBinding
metadata:
  name: my-service-credential-binding
spec:
  forProvider:
    name: my-service-credential-binding
    type: key
    serviceInstanceRef:
      name: my-service-instance
      policy:
        resolve: Always
  connectionDetailsAsJSON: false
  writeConnectionSecretToRef:
    name: my-service-credential
    namespace: default