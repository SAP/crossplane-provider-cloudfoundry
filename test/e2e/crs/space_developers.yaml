apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: SpaceMembers
metadata:
  namespace: default
  name: my-space-developers
spec:
  forProvider:
    roleType: Developers
    members:
      - username: $USER_WHERE_ROLES_GET_ASSIGNED_EMAIL # technical used in test for roles
      - username: $TECHNICAL_USER_EMAIL #technical user for testing
    spaceRef:
      name: my-space
      policy:
        resolve: Always
    enforcementPolicy: Strict