apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Organization
metadata:
  name: upgrade-test-org
spec:
  managementPolicies:
    - Observe
  forProvider:
    name: cf-ci-e2e
---
apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Space
metadata:
  name: upgrade-test-import-space
spec:
  managementPolicies:
    - Observe
  forProvider:
    name: upgrade-test-space-donotdelete
    orgRef:
      name: upgrade-test-org
      policy:
        resolve: Always
  providerConfigRef:
    name: default
