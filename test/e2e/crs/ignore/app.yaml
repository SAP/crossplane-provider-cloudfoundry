---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: App
metadata:
  namespace: default
  name: my-app
spec:
  forProvider:
    name: hello-app
    dockerImage: cloud-orchestration-experimental.common.repositories.cloud.sap/hello-cf:latest
    dockerCredentialsSecretRef:
      name: artifactory-secret
      namespace: crossplane-system
    spaceRef:
      name: my-space
      policy:
        resolve: Always
    routes:
    - routeRef:
        name: my-route
        policy:
          resolve: Always
    serviceBinding:
    - serviceInstanceRef:
        name: my-ups