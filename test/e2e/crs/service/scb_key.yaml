apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: ServiceCredentialBinding
metadata:
  name: e2e-scb-key
  namespace: service-test
spec:
  forProvider:
    name: e2e-scb-key-$BUILD_ID
    type: key
    serviceInstanceRef:
      name: e2e-service-instance
      policy:
        resolve: Always
    rotation:
      frequency: 1h
      ttl: 2h
    labels:
      environment: test
      team: platform
    annotations:
      description: E2E test service credential binding
  connectionDetailsAsJSON: false
  writeConnectionSecretToRef:
    name: e2e-service-key-$BUILD_ID
    namespace: default # keep it default, changing it to service-test will cause the test to hang
