---
apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Organization
metadata:
  namespace: service-test
  name: service-org
spec:
  managementPolicies:
    - Observe
  forProvider:
    name: cf-ci-e2e

---
# import service-space with roles pre-configured
apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Space
metadata:
  namespace: service-test
  name: service-space
spec:
  managementPolicies:
    - Observe
  forProvider:
    name: space-donotdelete
    orgRef:
      name:  service-org
      policy:
        resolve: Always

---
# Space that the service instance will be shared with
apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Space
metadata:
  name: service-space-shared
  namespace: service-test
spec:
  managementPolicies:
    - Observe
  forProvider:
    name: space-shared-donotdelete
    orgRef:
      name: service-org
      policy:
        resolve: Always

