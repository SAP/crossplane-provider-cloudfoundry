apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: ServiceCredentialBinding
metadata:
  name: upgrade-test-service-credential-binding
  annotations:
    crossplane.io/paused: "false"
spec:
  forProvider:
    name: upgrade-test-service-credential-binding
    type: key
    serviceInstanceRef:
      name: upgrade-test-service-instance
      policy:
        resolve: Always
  providerConfigRef:
    name: default