sonar.host.url=https://sonar.tools.sap

sonar.projectKey=sap.cloud.orchestrate:crossplane-provider-cloudfoundry
sonar.projectName=crossplane-provider-cloudfoundry


sonar.language=go
sonar.sources=.
sonar.inclusions=**/*.go
sonar.exclusions=**/*_test.go,test/**,api/**,**/zz_*.go
sonar.tests=,
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**
sonar.go.coverage.reportPaths=cover.out
