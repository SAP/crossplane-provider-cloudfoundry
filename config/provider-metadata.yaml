name: cloudfoundry/cloudfoundry
resources:
    cloudfoundry_app:
        subCategory: ""
        description: Provides a Cloud Foundry resource to manage applications.
        name: cloudfoundry_app
        title: cloudfoundry_app Resource - terraform-provider-cloudfoundry
        examples:
            - name: gobis-server
              manifest: |-
                {
                  "environment": {
                    "MY_ENV": "red"
                  },
                  "instances": 1,
                  "name": "tf-test-do-not-delete-nodejs",
                  "org_name": "PerformanceTeamBLR",
                  "path": "${zipper_file.fixture.output_path}",
                  "routes": [
                    {
                      "route": "tf-test-do-not-delete-nodejs.cfapps.sap.hana.ondemand.com"
                    }
                  ],
                  "service_bindings": [
                    {
                      "params": "{\n  \"xsappname\": \"tf-test-app\",\n  \"tenant-mode\": \"dedicated\",\n  \"description\": \"tf test123\",\n  \"foreign-scope-references\": [\"user_attributes\"],\n  \"scopes\": [\n    {\n      \"name\": \"uaa.user\",\n      \"description\": \"UAA\"\n    }\n  ],\n  \"role-templates\": [\n    {\n      \"name\": \"Token_Exchange\",\n      \"description\": \"UAA\",\n      \"scope-references\": [\"uaa.user\"]\n    }\n  ]\n}\n",
                      "service_instance": "xsuaa-tf"
                    }
                  ],
                  "source_code_hash": "${zipper_file.fixture.output_sha}",
                  "space_name": "tf-space-1",
                  "strategy": "rolling"
                }
              references:
                path: zipper_file.fixture.output_path
                source_code_hash: zipper_file.fixture.output_sha
              dependencies:
                zipper_file.fixture: |-
                    {
                      "output_path": "cf-sample-app-nodejs.zip",
                      "source": "https://github.com/cloudfoundry-samples/cf-sample-app-nodejs.git"
                    }
            - name: http-bin-server
              manifest: |-
                {
                  "annotations": {
                    "created-by": "me"
                  },
                  "docker_image": "kennethreitz/httpbin",
                  "labels": {
                    "app": "backend",
                    "env": "production"
                  },
                  "name": "tf-test-do-not-delete-http-bin",
                  "no_route": true,
                  "org_name": "PerformanceTeamBLR",
                  "processes": [
                    {
                      "disk_quota": "1024M",
                      "health_check_http_endpoint": "/get",
                      "health_check_type": "http",
                      "instances": 1,
                      "memory": "256M",
                      "readiness_health_check_http_endpoint": "/get",
                      "readiness_health_check_type": "http",
                      "type": "web"
                    }
                  ],
                  "space_name": "tf-space-1",
                  "strategy": "blue-green"
                }
              dependencies:
                zipper_file.fixture: |-
                    {
                      "output_path": "cf-sample-app-nodejs.zip",
                      "source": "https://github.com/cloudfoundry-samples/cf-sample-app-nodejs.git"
                    }
            - name: http-bin-sidecar
              manifest: |-
                {
                  "docker_image": "kennethreitz/httpbin",
                  "name": "tf-test-do-not-delete-http-bin-sidecar",
                  "no_route": true,
                  "org_name": "PerformanceTeamBLR",
                  "sidecars": [
                    {
                      "command": "sleep 5200",
                      "memory": "256M",
                      "name": "sidecar-1",
                      "process_types": [
                        "worker"
                      ]
                    }
                  ],
                  "space_name": "tf-space-1"
                }
              dependencies:
                zipper_file.fixture: |-
                    {
                      "output_path": "cf-sample-app-nodejs.zip",
                      "source": "https://github.com/cloudfoundry-samples/cf-sample-app-nodejs.git"
                    }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            buildpacks: (Set of String) Multiple buildpacks used to stage the application.
            command: (String) A custom start command for the application. This overrides the start command provided by the buildpack.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            disk_quota: (String) The disk space to be allocated for each application instance.
            docker_credentials: (Attributes) Defines login credentials for private docker repositories (see below for nested schema)
            docker_image: (String) The URL to the docker image with tag e.g registry.example.com:5000/user/repository/tag or docker image name from the public repo e.g. redis:4.0
            environment: (Map of String) Key/value pairs of custom environment variables to set in your app. Does not include any system or service variables.
            health_check_http_endpoint: (String) The endpoint for the http health check type.
            health_check_interval: (Number) The interval in seconds between health checks.
            health_check_invocation_timeout: (Number) The timeout in seconds for the health check requests for http and port health checks.
            health_check_type: (String) The health check type which can be one of 'port', 'process', 'http'.
            id: (String) The GUID of the object.
            instances: (Number) The number of app instances that you want to start. Defaults to 1.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            log_rate_limit_per_second: (String) The attribute specifies the log rate limit for all instances of an app.
            memory: (String) The memory limit for each application instance. If not provided, value is computed and retreived from Cloud Foundry.
            name: (String) The name of the application.
            no_route: (Boolean) The attribute with a value of true to prevent a route from being created for your app.
            org_name: (String) The name of the associated Cloud Foundry organization.
            params: (String) A json object to send to the service broker during service binding.
            password: (String, Sensitive) The password for the private docker repository.
            path: (String) The path to the zip file for the application.
            process_types: (Set of String) List of processes to associate sidecar with.
            processes: (Attributes Set) List of configurations for individual process types. (see below for nested schema)
            protocol: (String) The protocol to use for the route. Valid values are http2, http1, and tcp.
            random_route: (Boolean) The random-route attribute to generate a unique route and avoid name collisions.
            readiness_health_check_http_endpoint: (String) The endpoint for the http readiness health check type.
            readiness_health_check_interval: (Number) The interval in seconds between readiness health checks.
            readiness_health_check_invocation_timeout: (Number) The timeout in seconds for the readiness health check requests for http and port health checks.
            readiness_health_check_type: (String) The readiness health check type which can be one of 'port', 'process', 'http'.
            route: (String) The fully route qualified domain name which will be bound to app
            routes: (Attributes Set) The routes to map to the application to control its ingress traffic. (see below for nested schema)
            service_bindings: (Attributes Set) Service instances to bind to the application. (see below for nested schema)
            service_instance: (String) The service instance name.
            sidecars: (Attributes Set) The attribute specifies additional processes to run in the same container as your app (see below for nested schema)
            source_code_hash: (String) Used to trigger updates. Must be set to a base64-encoded SHA256 hash of the path specified.
            space_name: (String) The name of the associated Cloud Foundry space.
            stack: (String) The base operating system and file system that your application will execute in. Please refer to the docs for more information
            strategy: (String) The deployment strategy to use when deploying the application. Valid values are 'none', 'rolling', and 'blue-green', defaults to 'none'.
            timeout: (Number) Time in seconds at which the health-check will report failure.
            type: (String) The process type. Can be web or worker.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            username: (String, Sensitive) The username for the private docker repository.
        importStatements: []
    cloudfoundry_buildpack:
        subCategory: ""
        description: Provides a Cloud Foundry resource for managing Cloud Foundry buildpacks.
        name: cloudfoundry_buildpack
        title: cloudfoundry_buildpack Resource - terraform-provider-cloudfoundry
        examples:
            - name: mybuildpack
              manifest: |-
                {
                  "enabled": false,
                  "labels": {
                    "hi": "fi"
                  },
                  "locked": false,
                  "name": "hi",
                  "path": "somethin.zip",
                  "position": 2,
                  "stack": "cflinuxfs3"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            enabled: (Boolean) Whether or not the buildpack can be used for staging
            filename: (String) The filename of the buildpack
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            locked: (Boolean) Whether or not the buildpack is locked to prevent updating the bits
            name: (String) Name of the buildpack
            path: (String) Path of the zip file for the buildpack
            position: (Number) The order in which the buildpacks are checked during buildpack auto-detection
            source_code_hash: (String) SHA256 hash of the file specified. Terraform relies on this to detect the file changes.
            stack: (String) The name of the stack that the buildpack will use
            state: (String) The state of the buildpack
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_domain:
        subCategory: ""
        description: Provides a resource for managing shared or private domains in Cloud Foundry.
        name: cloudfoundry_domain
        title: cloudfoundry_domain Resource - terraform-provider-cloudfoundry
        examples:
            - name: mydomain
              manifest: |-
                {
                  "name": "test.cfapps.stagingazure.hanavlab.ondemand.com",
                  "org": "23919ba5-f9b6-4128-a1fb-69890818d25c",
                  "shared_orgs": [
                    "537e7b58-b3e0-4464-9cad-2deae6120a80",
                    "30edf44a-2d4c-432c-9680-9a61123edcf1"
                  ]
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            internal: (Boolean) Whether the domain is used for internal (container-to-container) traffic, or external (user-to-container) traffic
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            name: (String) The name of the domain;must be between 3 ~ 253 characters and follow RFC 1035
            org: (String) The organization the domain is scoped to; if set, the domain will only be available in that organization; otherwise, the domain will be globally available
            router_group: '(String) The desired router group guid. note: creates a tcp domain; cannot be used when internal is set to true or domain is scoped to an org'
            shared_orgs: (Set of String) Organizations the domain is shared with; if set, the domain will be available in these organizations in addition to the organization the domain is scoped to
            supported_protocols: (Set of String) Available protocols for routes using the domain, currently http and tcp
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_isolation_segment:
        subCategory: ""
        description: Provides an isolation segment resource for Cloud Foundry.
        name: cloudfoundry_isolation_segment
        title: cloudfoundry_isolation_segment Resource - terraform-provider-cloudfoundry
        examples:
            - name: isosegment
              manifest: |-
                {
                  "labels": {
                    "purpose": "testing"
                  },
                  "name": "hifi"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            name: (String) Name of the isolation segment
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_isolation_segment_entitlement:
        subCategory: ""
        description: Provides a Cloud Foundry resource for entitling and revoking isolation segment from organizations. Only entitles and revokes the segment from the orgs managed through this resource and does not touch existing entitlements. Revoking isolation segment entitlement from an organization will fail if it is the default for the organization. On deleting the resource, the isolation segment will be revoked from the mentioned orgs.
        name: cloudfoundry_isolation_segment_entitlement
        title: cloudfoundry_isolation_segment_entitlement Resource - terraform-provider-cloudfoundry
        examples:
            - name: isosegment
              manifest: |-
                {
                  "default": true,
                  "orgs": [
                    "c8e454cc-7a24-4d71-b146-51d69538acfb"
                  ],
                  "segment": "63ae51b9-9073-4409-81b0-3704b8de85dd"
                }
        argumentDocs:
            default: (Boolean) Set isolation segment as default for the organizations. Defaults to false.
            orgs: (Set of String) GUID's of organizations to entitle the segment to.
            segment: (String) GUID of the isolation segment
        importStatements: []
    cloudfoundry_mta:
        subCategory: ""
        description: 'Allows deploying applications and services via an MTAR archive or URL. Further documentation: Multitarget Applications in the Cloud Foundry Environment https://help.sap.com/docs/btp/sap-business-technology-platform/multitarget-applications-in-cloud-foundry-environment'
        name: cloudfoundry_mta
        title: cloudfoundry_mta Resource - terraform-provider-cloudfoundry
        examples:
            - name: mtar
              manifest: |-
                {
                  "extension_descriptors": [
                    "./prod.mtaext",
                    "prod-scale-vertically.mtaext"
                  ],
                  "mtar_path": "./my-mta_1.0.0.mtar",
                  "namespace": "test",
                  "source_code_hash": "${join(\"\", [filesha256(\"./my-mta_1.0.0.mtar\"), filesha256(\"./prod.mtaext\"), filesha256(\"prod-scale-vertically.mtaext\")])}",
                  "space": "02c0cc92-6ecc-44b1-b7b2-096ca19ee143"
                }
        argumentDocs:
            app_name: (String)
            created_on: (String)
            deploy_url: (String) The URL of the deploy service, if a custom one has been used(should be present in the same landscape). By default 'deploy-service.'
            extension_descriptors: (Set of String) The paths for the MTA deployment extension files.
            id: (String) The MTA ID of the deployment
            metadata: (Attributes) an identifier, version and namespace that uniquely identify the MTA (see below for nested schema)
            module_name: (String)
            modules: (Attributes List) the deployable parts contained in the MTA deployment archive, most commonly Cloud Foundry applications or content (see below for nested schema)
            mta: (Attributes) contains the details of the MTA object (see below for nested schema)
            mtar_path: (String) The local path where the MTA archive is present. Either this attribute or mtar_url need to be set.
            mtar_url: (String) The remote URL where the MTA archive is present
            namespace: (String) The namespace of the MTA. Should be of valid host format
            provided_dendency_names: (List of String)
            services: (List of String)
            source_code_hash: (String) SHA256 hash of the file specified. Terraform relies on this to detect the file changes.
            space: (String) The GUID of the space where the MTA will be deployed
            updated_on: (String)
            uris: (List of String)
            version: (String)
        importStatements: []
    cloudfoundry_org:
        subCategory: ""
        description: Creates a Cloud Foundry Organization
        name: cloudfoundry_org
        title: cloudfoundry_org Resource - terraform-provider-cloudfoundry
        examples:
            - name: org
              manifest: |-
                {
                  "annotations": {
                    "env-ann": "test-ann"
                  },
                  "labels": {
                    "env": "test"
                  },
                  "name": "tf-test-iso",
                  "suspended": false
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The ID of the Organization
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            name: (String) The name of the Organization in Cloud Foundry
            quota: (String) The ID of quota to be applied to this Org. Default quota is assigned to the org by default.
            suspended: (Boolean) Whether an organization is suspended or not.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_org_quota:
        subCategory: ""
        description: Provides a Cloud Foundry resource to manage org quota definitions.
        name: cloudfoundry_org_quota
        title: cloudfoundry_org_quota Resource - terraform-provider-cloudfoundry
        examples:
            - name: org_quota
              manifest: |-
                {
                  "allow_paid_service_plans": true,
                  "instance_memory": 2048,
                  "name": "tf-test-do-not-delete",
                  "orgs": [
                    "ba10cc63-cc43-46b1-a00c-5f2a0d7d992e"
                  ],
                  "total_app_instances": 100,
                  "total_app_log_rate_limit": 1000,
                  "total_app_tasks": 10,
                  "total_memory": 51200,
                  "total_private_domains": 40,
                  "total_route_ports": 5,
                  "total_routes": 50,
                  "total_service_keys": 120,
                  "total_services": 200
                }
        argumentDocs:
            allow_paid_service_plans: (Boolean) Determines whether users can provision instances of non-free service plans. Does not control plan visibility. When false, non-free service plans may be visible in the marketplace but instances can not be provisioned.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            instance_memory: (Number) Maximum memory per application instance.
            name: (String) The name you use to identify the quota or plan in Cloud Foundry
            orgs: (Set of String) Set of Org GUIDs to which this org quota would be assigned.
            total_app_instances: (Number) Maximum app instances allowed.
            total_app_log_rate_limit: (Number) Maximum log rate allowed for all the started processes and running tasks in bytes/second.
            total_app_tasks: (Number) Maximum tasks allowed per app.
            total_memory: (Number) Maximum memory usage allowed.
            total_private_domains: (Number) Maximum number of private domains allowed to be created within the Org.
            total_route_ports: (Number) Maximum routes with reserved ports.
            total_routes: (Number) Maximum routes allowed.
            total_service_keys: (Number) Maximum service keys allowed.
            total_services: (Number) Maximum services allowed.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_org_role:
        subCategory: ""
        description: Provides a Cloud Foundry resource for assigning org roles.(Updating a role is not supported according to the docs)
        name: cloudfoundry_org_role
        title: cloudfoundry_org_role Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_role
              manifest: |-
                {
                  "org": "784b4cd0-4771-4e4d-9052-a07e178bae56",
                  "type": "organization_user",
                  "username": "test123@example.com"
                }
        argumentDocs:
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            org: (String) The guid of the organization to assign the role to
            origin: (String) The identity provider for the UAA user
            type: (String) Role type; see Valid role types
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            user: (String) The guid of the cloudfoundry user to assign the role with
            username: (String) The username of the cloudfoundry user to assign the role with
        importStatements: []
    cloudfoundry_route:
        subCategory: ""
        description: Provides a Cloud Foundry resource for managing Cloud Foundry application routes.
        name: cloudfoundry_route
        title: cloudfoundry_route Resource - terraform-provider-cloudfoundry
        examples:
            - name: bruh
              manifest: |-
                {
                  "destinations": [
                    {
                      "app_id": "24a711f2-148b-4d48-b37a-90a66d6e842f"
                    },
                    {
                      "app_id": "15a74002-cf3a-4bf2-b76f-fe96867c46ee",
                      "app_process_type": "web",
                      "port": 36001
                    }
                  ],
                  "domain": "440e24e5-ee11-41d9-a996-2ed0a1e2deea",
                  "host": "testing123",
                  "path": "/cart",
                  "space": "795a961c-6360-479a-9666-fff9cb906aad"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            app_id: (String) The GUID of the app to route traffic to.
            app_process_type: (String) Type of the process belonging to the app to route traffic to.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            destinations: (Attributes Set) A destination represents the relationship between a route and a resource that can serve traffic. (see below for nested schema)
            domain: (String) The domain guid associated to the route.
            host: (String) The hostname for the route; not compatible with routes specifying the tcp protocol; must be either a wildcard (*) or be under 63 characters long and only contain letters, numbers, dashes (-) or underscores(_)
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            path: (String) The path for the route; not compatible with routes specifying the tcp protocol; must be under 128 characters long and not contain question marks (?), begin with a slash (/) and not be exactly a slash (/).
            port: (Number) The port that the route listens on. Only compatible with routes specifying the tcp protocol
            protocol: (String) The protocol supported by the route, based on the route's domain configuration.
            space: (String) The space guid associated to the route.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            url: (String) The URL for the route.
            weight: (Number) Percentage of traffic which will be routed to this destination.
        importStatements: []
    cloudfoundry_security_group:
        subCategory: ""
        description: Provides an application security group resource for Cloud Foundry. This resource defines egress rules that can be applied to containers that stage and run applications.
        name: cloudfoundry_security_group
        title: cloudfoundry_security_group Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_security_group
              manifest: |-
                {
                  "globally_enabled_running": false,
                  "globally_enabled_staging": false,
                  "name": "tf-test",
                  "rules": [
                    {
                      "destination": "192.168.1.100",
                      "log": true,
                      "ports": "1883,8883",
                      "protocol": "tcp"
                    },
                    {
                      "destination": "192.168.1.100",
                      "log": false,
                      "ports": "1883,8883",
                      "protocol": "udp"
                    },
                    {
                      "code": 0,
                      "destination": "192.168.1.100",
                      "log": false,
                      "protocol": "icmp",
                      "type": 0
                    }
                  ],
                  "running_spaces": [
                    "e6886bba-e263-4b52-aaf1-85d410f15fc8"
                  ],
                  "staging_spaces": [
                    "3bc20dc4-1870-4835-8308-dda2d766e61e",
                    "e6886bba-e263-4b52-aaf1-85d410f15fc8"
                  ]
                }
        argumentDocs:
            code: (Number) Code required for ICMP protocol; valid values are between -1 and 255 (inclusive), where -1 allows all
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            description: (String) A description for the rule
            destination: (String) Destinations that the rule applies to. Valid CIDR, IP address, or IP address range
            globally_enabled_running: (Boolean) Specifies whether the group should be applied globally to all running applications
            globally_enabled_staging: (Boolean) Specifies whether the group should be applied globally to all staging applications
            id: (String) The GUID of the object.
            log: (Boolean) Enable logging for rule
            name: (String) Name of the security group
            ports: (String) Ports that the rule applies to; can be a single port (9000), a comma-separated list (9000,9001), or a range (9000-9200)
            protocol: (String) Protocol type. Valid values are tcp, udp, icmp, or all
            rules: (Attributes List) Rules that will be applied by this security group (see below for nested schema)
            running_spaces: (Set of String) The spaces where the security_group is applied to applications during runtime
            staging_spaces: (Set of String) The spaces where the security_group is applied to applications during staging
            type: (Number) Type required for ICMP protocol; valid values are between -1 and 255 (inclusive), where -1 allows all
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_service_broker:
        subCategory: ""
        description: Provides a Cloud Foundry resource for managing service brokers
        name: cloudfoundry_service_broker
        title: cloudfoundry_service_broker Resource - terraform-provider-cloudfoundry
        examples:
            - name: mysql
              manifest: |-
                {
                  "name": "broker",
                  "password": "test",
                  "url": "example.broker.com",
                  "username": "test"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            name: (String) Name of the service broker
            password: (String, Sensitive) The password with which to authenticate against the service broker.
            space: (String) The GUID of the space the service broker is restricted to; omitted for globally available service brokers
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            url: (String) URL of the service broker
            username: (String) The username with which to authenticate against the service broker.
        importStatements: []
    cloudfoundry_service_credential_binding:
        subCategory: ""
        description: Service credential bindings are used to make the details of the connection to a service instance available to an app or a developer. Service credential bindings can be of type app or key. A service credential binding is of type app when it is a binding between a service instance and an application Not all services support this binding, as some services deliver value to users directly without integration with an application. Field broker_catalog.features.bindable from service plan of the service instance can be used to determine if it is bindable. A service credential binding is of type key when it only retrieves the details of the service instance and makes them available to the developer.
        name: cloudfoundry_service_credential_binding
        title: cloudfoundry_service_credential_binding Resource - terraform-provider-cloudfoundry
        examples:
            - name: scb7
              manifest: |-
                {
                  "app": "ec6ac2b3-fb79-43c4-9734-000d4299bd59",
                  "name": "hifi",
                  "service_instance": "e9ec29ca-993d-42e2-9c5b-cb17b1972cce",
                  "type": "app"
                }
            - name: scb1
              manifest: |-
                {
                  "name": "hifi",
                  "service_instance": "e9ec29ca-993d-42e2-9c5b-cb17b1972cce",
                  "type": "key"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            app: (String) The GUID of the app to be bound. Required when type is app
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            description: (String) A description of the last operation
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            last_operation: (Attributes) The details of the last operation performed on the resource (see below for nested schema)
            name: (String) Name of the service credential binding. name is optional when the type is app
            parameters: (String, Sensitive) A JSON object that is passed to the service broker for managed service instance.
            service_instance: (String) The GUID of the service instance to be bound
            state: (String) The state of the last operation
            type: (String) Type of the service credential binding. Either app or key.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_service_instance:
        subCategory: ""
        description: 'Creates a service instance in a cloudfoundry space. Further documentation: https://docs.cloudfoundry.org/devguide/services'
        name: cloudfoundry_service_instance
        title: cloudfoundry_service_instance Resource - terraform-provider-cloudfoundry
        examples:
            - name: xsuaa_svc
              manifest: |-
                {
                  "name": "xsuaa_sv1",
                  "parameters": "  {\n  \"xsappname\": \"tf-test2\",\n  \"tenant-mode\": \"dedicated\",\n  \"description\": \"tf test123\",\n  \"foreign-scope-references\": [\"user_attributes\"],\n  \"scopes\": [\n    {\n      \"name\": \"uaa.user\",\n      \"description\": \"UAA\"\n    }\n  ],\n  \"role-templates\": [\n    {\n      \"name\": \"Token_Exchange\",\n      \"description\": \"UAA\",\n      \"scope-references\": [\"uaa.user\"]\n    }\n  ]\n}\n",
                  "service_plan": "${data.cloudfoundry_service_plans.xsuaa_svc.service_plans[0].id}",
                  "space": "${data.cloudfoundry_space.team_space.id}",
                  "tags": [
                    "terraform-test",
                    "test1"
                  ],
                  "type": "managed"
                }
              references:
                service_plan: data.cloudfoundry_service_plans.xsuaa_svc.service_plans[0].id
                space: data.cloudfoundry_space.team_space.id
            - name: dev-autoscaler
              manifest: |-
                {
                  "name": "tf-autoscaler-test",
                  "service_plan": "${data.cloudfoundry_service_plans.autoscaler_svc.service_plans[0].id}",
                  "space": "${data.cloudfoundry_space.team_space.id}",
                  "tags": [
                    "terraform-test",
                    "autoscaler"
                  ],
                  "timeouts": {
                    "create": "10m"
                  },
                  "type": "managed"
                }
              references:
                service_plan: data.cloudfoundry_service_plans.autoscaler_svc.service_plans[0].id
                space: data.cloudfoundry_space.team_space.id
            - name: dev-usp
              manifest: |-
                {
                  "credentials": "  {\n    \"user\": \"user1\",\n    \"password\": \"demo122\"\n  }\n",
                  "name": "tf-usp-test1",
                  "space": "${data.cloudfoundry_space.team_space.id}",
                  "tags": [
                    "terraform-test",
                    "usp"
                  ],
                  "type": "user-provided"
                }
              references:
                space: data.cloudfoundry_space.team_space.id
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            create: (String) Timeout for creating the service instance. Default is 40 minutes
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            credentials: (String, Sensitive) A JSON object that is made available to apps bound to this service instance of type user-provided.
            dashboard_url: (String) The URL to the service instance dashboard (or null if there is none); only shown when type is managed.
            delete: (String) Timeout for deleting the service instance. Default is 40 minutes
            description: (String) A description of the last operation
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            last_operation: (Attributes) The details of the last operation performed on the resource (see below for nested schema)
            maintenance_info: (Attributes) Information about the version of this service instance; only shown when type is managed (see below for nested schema)
            name: (String) The name of the service instance
            parameters: (String, Sensitive) A JSON object that is passed to the service broker for managed service instance.
            route_service_url: (String) URL to which requests for bound routes will be forwarded; only shown when type is user-provided.
            service_plan: (String) The ID of the service plan from which to create the service instance
            space: (String) The ID of the space in which to create the service instance
            state: (String) The state of the last operation
            syslog_drain_url: (String) URL to which logs for bound applications will be streamed; only shown when type is user-provided.
            tags: (List of String) List of tags used by apps to identify service instances. They are shown in the app VCAP_SERVICES env.
            timeouts: (Attributes) (see below for nested schema)
            type: (String) Type of the service instance. Either managed or user-provided.
            update: (String) Timeout for updating the service instance. Default is 40 minutes
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            upgrade_available: (Boolean) Whether or not an upgrade of this service instance is available on the current Service Plan; details are available in the maintenance_info object; Only shown when type is managed
            version: (String) The version of the service instance
        importStatements: []
    cloudfoundry_service_route_binding:
        subCategory: ""
        description: Service route bindings are relations between a service instance and a route. Not all service instances support route binding. In order to bind to a managed service instance, the service instance should be created from a service offering that has requires route forwarding (requires=[route_forwarding]). In order to bind to a user-provided service instance, the service instance must have route_service_url set.
        name: cloudfoundry_service_route_binding
        title: cloudfoundry_service_route_binding Resource - terraform-provider-cloudfoundry
        examples:
            - name: srb7
              manifest: |-
                {
                  "labels": {
                    "hi": "fi"
                  },
                  "route": "3966c2fb-d84d-462d-82a5-a81cf7cdab20",
                  "service_instance": "3a8588f9-f846-444f-ab9e-48282f06449b"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            description: (String) A description of the last operation
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            last_operation: (Attributes) The details of the last operation performed on the resource (see below for nested schema)
            parameters: (String) A JSON object that is passed to the service broker for managed service instance.
            route: (String) The GUID of the route to be bound
            route_service_url: (String) URL to which requests for bound routes will be forwarded.
            service_instance: (String) The GUID of the service instance to be bound
            state: (String) The state of the last operation
            type: (String) The type of the last operation
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_space:
        subCategory: ""
        description: Provides a Cloud Foundry resource for managing Cloud Foundry spaces within organizations.
        name: cloudfoundry_space
        title: cloudfoundry_space Resource - terraform-provider-cloudfoundry
        examples:
            - name: space
              manifest: |-
                {
                  "allow_ssh": "true",
                  "labels": {
                    "purpose": "prod",
                    "test": "pass"
                  },
                  "name": "space",
                  "org": "c8e454cc-7a24-4d71-b146-51d69538acfb"
                }
        argumentDocs:
            allow_ssh: (Boolean) Allows SSH to application containers via the CF CLI.
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            isolation_segment: (String) The ID of the isolation segment to assign to the space. The isolation segment must be entitled to the space's parent organization
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            name: (String) The name of the Space in Cloud Foundry
            org: (String) The ID of the Org within which to create the space
            quota: (String) The space quota applied to the space. To assign a space quota, use the space quota resource instead.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_space_quota:
        subCategory: ""
        description: Provides a Cloud Foundry resource to manage space quota definitions.
        name: cloudfoundry_space_quota
        title: cloudfoundry_space_quota Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_space_quota
              manifest: |-
                {
                  "allow_paid_service_plans": true,
                  "instance_memory": 2048,
                  "name": "tf-test-do-not-delete",
                  "org": "ca721b24-e24d-4171-83e1-1ef6bd836b38",
                  "spaces": [
                    "3bc20dc4-1870-4835-8308-dda2d766e61e"
                  ],
                  "total_app_instances": 110,
                  "total_app_log_rate_limit": 1000,
                  "total_app_tasks": 10,
                  "total_memory": 51200,
                  "total_route_ports": 5,
                  "total_routes": 50,
                  "total_service_keys": 120,
                  "total_services": 200
                }
        argumentDocs:
            allow_paid_service_plans: (Boolean) Determines whether users can provision instances of non-free service plans. Does not control plan visibility. When false, non-free service plans may be visible in the marketplace but instances can not be provisioned.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            instance_memory: (Number) Maximum memory per application instance.
            name: (String) The name you use to identify the quota or plan in Cloud Foundry
            org: (String) The ID of the Org within which to create the space quota
            spaces: (Set of String) Set of space GUIDs to which this space quota would be assigned.
            total_app_instances: (Number) Maximum app instances allowed.
            total_app_log_rate_limit: (Number) Maximum log rate allowed for all the started processes and running tasks in bytes/second.
            total_app_tasks: (Number) Maximum tasks allowed per app.
            total_memory: (Number) Maximum memory usage allowed.
            total_route_ports: (Number) Total number of ports that are reservable by routes in a space.
            total_routes: (Number) Maximum routes allowed.
            total_service_keys: (Number) Maximum service keys allowed.
            total_services: (Number) Maximum services allowed.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
        importStatements: []
    cloudfoundry_space_role:
        subCategory: ""
        description: Provides a Cloud Foundry resource for assigning space roles. For a user to be assigned a space role, the user must already have the organization_user role.(Updating a role is not supported according to the docs)
        name: cloudfoundry_space_role
        title: cloudfoundry_space_role Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_role
              manifest: |-
                {
                  "space": "dd457c79-f7c9-4828-862b-35843d3b646d",
                  "type": "space_manager",
                  "username": "test123@example.com"
                }
        argumentDocs:
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            id: (String) The GUID of the object.
            origin: (String) The identity provider for the UAA user
            space: (String) The guid of the space to assign the role to
            type: (String) Role type; see Valid role types
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            user: (String) The guid of the cloudfoundry user to assign the role with
            username: (String) The username of the cloudfoundry user to assign the role with
        importStatements: []
    cloudfoundry_user:
        subCategory: ""
        description: Provides a resource for creating users in the origin store and registering them in Cloud Foundry. If the origin store user or the CF user already exists with the given username, it will fetch that user and store it in the state for resource management.
        name: cloudfoundry_user
        title: cloudfoundry_user Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_user
              manifest: |-
                {
                  "annotations": {
                    "hi": "hello",
                    "purpose": "testing"
                  },
                  "email": "test@gmail.com",
                  "family_name": "test",
                  "given_name": "test",
                  "password": "test123",
                  "username": "test"
                }
        argumentDocs:
            annotations: (Map of String) The annotations associated with Cloud Foundry resources. Add as described here.
            created_at: (String) The date and time when the resource was created in RFC3339 format.
            email: (String) The email address of the user. When not provided, name is used as email.
            family_name: (String) The user's last name.
            given_name: (String) The user's first name.
            groups: (Set of String) Any UAA groups / roles to associate the user with.
            id: (String) The GUID of the object.
            labels: (Map of String) The labels associated with Cloud Foundry resources. Add as described here.
            origin: (String) The alias of the Identity Provider that authenticated this user.
            password: (String, Sensitive) User's password, required if origin is set to uaa.
            updated_at: (String) The date and time when the resource was updated in RFC3339 format.
            username: (String) User name of the user, typically an email address.
        importStatements: []
    cloudfoundry_user_groups:
        subCategory: ""
        description: Provides a resource for adding or removing a user from various UAA origin store groups. If user already present in a particular group, no action will be taken
        name: cloudfoundry_user_groups
        title: cloudfoundry_user_groups Resource - terraform-provider-cloudfoundry
        examples:
            - name: my_user_groups
              manifest: |-
                {
                  "groups": [
                    "cloud_controller.admin",
                    "scim.read",
                    "scim.write"
                  ],
                  "origin": "uaa",
                  "user": "ad6bb1e0-05f6-4440-9485-6fe20b38c500"
                }
        argumentDocs:
            groups: (Set of String) The authorization scope or groups display names to add the user to.
            origin: (String) The user authentcation origin.
            user: (String) GUID of the isolation segment.
        importStatements: []
