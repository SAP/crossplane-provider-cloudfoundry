version: "2"
run:
  timeout: 2m
linters:
  enable:
    - goconst
    - gocritic
    - gocyclo
    - govet
    - misspell
    - nakedret
    - prealloc
    - staticcheck
    - unconvert
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt:.*,io
        - ioutil:^Read.*
    govet:
      disable:
        - shadow
    gocyclo:
      min-complexity: 10
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 5
    lll:
      tab-width: 1
    unparam:
      check-exported: false
    nakedret:
      max-func-lines: 30
    prealloc:
      simple: true
      range-loops: true
      for-loops: false
    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32
  exclusions:
    generated: lax
    rules:
      - path: _test(ing)?\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - unparam
      - path: _test\.go
        text: "(unnamedResult|exitAfterDefer)"
        linters:
          - gocritic
      - text: "(hugeParam|rangeValCopy):"
        linters:
          - gocritic
      - text: "SA3000:"
        linters:
          - staticcheck
      - text: "G101:"
        linters:
          - gosec
      - text: "G104:"
        linters:
          - gosec
    paths:
      - zz_generated\..+\.go$
issues:
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/SAP/crossplane-provider-cloudfoundry
  exclusions:
    generated: lax
    paths:
      - zz_generated\..+\.go$
