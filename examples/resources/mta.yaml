apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: Mta
metadata:
  name: test-mta-philipp
  namespace: default
spec:
  forProvider:
    namespace: default
    space: spaceid
    blueGreenDeploy: true
    abortOnError: false
    file:
      url: <url>
      credentialsSecretRef:
        name: artifactory-credentials-secret
        namespace: default
    modules:
      - bookshkop-srv-module2
      - bookshkop-srv
    deleteServices: true
    extension: |
      _schema-version: 3.3.0
      extends: bookshkop
      ID: bookshkop.extension
      modules:
        - name: bookshkop-srv
          parameters:
            instances: 3
            memory: 512M
        - name: bookshkop-srv-module2
          parameters:
            instances: 1
