---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: Route
metadata:
  name: my-route
spec:
  forProvider:
    domainRef:
      name: my-domain
    host: hello-cf-app
    spaceRef:
      name: my-space
      policy:
        resolve: Always


---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: Route
metadata:
  name: my-cfapps-route
spec:
  forProvider:
    domainRef:
      name: my-cfapps-domain
    host: hello-cf-app
    spaceRef:
      name: my-space
      policy:
        resolve: Always
