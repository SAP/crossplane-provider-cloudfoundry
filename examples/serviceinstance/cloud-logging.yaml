---
# CR to create a managed ServiceInstance
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: ServiceInstance
metadata:
  name: my-cloud-logging
spec:
  forProvider:
    type: managed
    name: my-cloud-logging
    spaceRef: 
      name: my-space
      policy: 
        resolve: Always
    servicePlan:
      offering: cloud-logging
      plan: dev
    jsonParams: |
      {
        "retention_period": 3
      }
---
# ALTERNATIVE YAML based CR to create a managed ServiceInstance
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha2
kind: ServiceInstance
metadata:
  name: my-cloud-logging
spec:
  forProvider:
    type: managed
    name: my-cloud-logging
    spaceRef: 
      name: my-space
      policy: 
        resolve: Always
    servicePlan:
      offering: cloud-logging
      plan: dev
    parameters:
      retention_period: 3