apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: ServiceInstance
metadata:
  name: my-service-instance-shared
spec:
  forProvider:
    type: managed
    name: my-service-instance-shared
    spaceRef:
      name: my-space
      policy:
        resolve: Always
    servicePlan:
      offering: alert-notification
      plan: standard
    sharedSpaces:
      - spaceRef:
          name: my-space-shared
