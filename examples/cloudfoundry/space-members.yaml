---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: Organization
metadata:
  namespace: default
  name: my-org
  annotations:
    crossplane.io/external-name: cf-dev
spec:
  forProvider: {}

---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: Space
metadata:
  namespace: default
  name: my-space
spec:
  forProvider:
    allowSsh: true
    name: space-test
    orgRef:
      name: my-org
      policy:
        resolve: Always

---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: SpaceMembers
metadata:
  namespace: default
  name: my-space-developers
spec:
  forProvider:
    roleType: Developers
    spaceRef:
      name: my-space
      policy:
        resolve: Always
    members:
    - username: mirza@groups.sap.com
    - username: 1@sap.com
    enforcementPolicy: Strict

---
apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: SpaceMembers
metadata:
  namespace: default
  name: my-space-supporters
spec:
  forProvider:
    roleType: Supporters
    spaceRef:
      name: my-space
      policy:
        resolve: Always
    members:
    - username: mirza@groups.sap.com
    enforcementPolicy: Lax