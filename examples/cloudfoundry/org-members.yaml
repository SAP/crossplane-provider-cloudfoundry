apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: OrgMembers
metadata:
  namespace: default
  name: my-org-auditors
spec:
  forProvider:
    roleType: Auditors
    orgRef:
      name: my-org
      policy:
        resolve: Always
    members:
    - username: co-test-user@example.com
    enforcementPolicy: Strict

---
apiVersion: cloudfoundry.crossplane.io/v1alpha1
kind: OrgMembers
metadata:
  namespace: default
  name: my-org-users
spec:
  forProvider:
    roleType: Users
    orgRef:
      name: my-org
      policy:
        resolve: Always
    members:
    - username: co-test-user@example.com
    enforcementPolicy: Lax
