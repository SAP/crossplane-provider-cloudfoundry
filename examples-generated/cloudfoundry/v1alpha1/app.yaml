apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: App
metadata:
  annotations:
    meta.upbound.io/example-id: cloudfoundry/v1alpha1/app
  labels:
    testing.upbound.io/example-name: gobis-server
  name: gobis-server
spec:
  forProvider:
    environment:
      MY_ENV: red
    instances: 1
    name: tf-test-do-not-delete-nodejs
    orgName: PerformanceTeamBLR
    path: ${zipper_file.fixture.output_path}
    routes:
    - routeSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    serviceBindings:
    - params: |
        {
          "xsappname": "tf-test-app",
          "tenant-mode": "dedicated",
          "description": "tf test123",
          "foreign-scope-references": ["user_attributes"],
          "scopes": [
            {
              "name": "uaa.user",
              "description": "UAA"
            }
          ],
          "role-templates": [
            {
              "name": "Token_Exchange",
              "description": "UAA",
              "scope-references": ["uaa.user"]
            }
          ]
        }
      serviceInstanceSelector:
        matchLabels:
          testing.upbound.io/example-name: example
    sourceCodeHash: ${zipper_file.fixture.output_sha}
    spaceName: tf-space-1
    strategy: rolling
