apiVersion: cloudfoundry.btp.orchestrate.cloud.sap/v1alpha1
kind: PrivateDomainAccess
metadata:
  annotations:
    meta.upbound.io/example-id: cloudfoundry/v1alpha1/privatedomainaccess
  labels:
    testing.upbound.io/example-name: shared-to-my-org
  name: shared-to-my-org
spec:
  forProvider:
    domainSelector:
      matchLabels:
        testing.upbound.io/example-name: cloudfoundry_domain
    orgSelector:
      matchLabels:
        testing.upbound.io/example-name: cloudfoundry_org
